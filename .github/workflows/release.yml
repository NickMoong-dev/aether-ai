name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 버전 태그 추출
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: releases 폴더에 버전 스냅샷 저장
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DEST="releases/$VERSION"
          mkdir -p "$DEST/build"
          cp index.html main.js preload.js renderer.js package.json release-notes.json "$DEST/"
          cp build/icon.ico "$DEST/build/"

      - name: 스냅샷 커밋 & push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/
          git commit -m "chore: ${{ steps.version.outputs.VERSION }} 릴리즈 스냅샷 저장 [skip ci]"
          git push origin HEAD:main

      - name: CHANGELOG에서 릴리즈 노트 추출
        id: changelog
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # 해당 버전 섹션만 추출
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Electron 앱 빌드 & GitHub Release 배포
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: GitHub Release 노트 업데이트
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ steps.version.outputs.VERSION }} \
            --notes "${{ steps.changelog.outputs.NOTES }}"
